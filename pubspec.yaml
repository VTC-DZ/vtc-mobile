name: khfif_drif
description: "inDrive-style ride-hailing app for Algeria."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0

  # Responsive sizing
  flutter_screenutil: ^5.9.3

  # Secure local storage
  flutter_secure_storage: ^9.2.2

  # Fonts — loads Plus Jakarta Sans + Inter without requiring TTF asset files
  google_fonts: ^6.2.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
